<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">User Management</h1>
            <div class="flex gap-4 text-sm font-medium text-slate-500">
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6 md:p-12 pt-0 md:pt-4">
        <div class="flex flex-col md:flex-row gap-10">
            
            <!-- Form Section -->
            <div class="w-full md:w-1/3">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 sticky top-10">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Create Account</h2>
                    
                    <form id="registrationForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">First Name</label>
                            <input type="text" id="firstName" required placeholder="Jane"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Last Name</label>
                            <input type="text" id="lastName" required placeholder="Doe"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Gender</label>
                            <div class="flex gap-6 mt-2">
                                <label class="flex items-center cursor-pointer group">
                                    <input type="radio" name="gender" value="Male" checked class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                                    <span class="ml-2 text-slate-600 group-hover:text-indigo-600 transition-colors">Male</span>
                                </label>
                                <label class="flex items-center cursor-pointer group">
                                    <input type="radio" name="gender" value="Female" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                                    <span class="ml-2 text-slate-600 group-hover:text-indigo-600 transition-colors">Female</span>
                                </label>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                            <input type="password" id="password" required placeholder="••••••••"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>

                        <button type="submit" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98]">
                            Register User
                        </button>
                    </form>

                    <!-- Success Message -->
                    <div id="successMsg" class="hidden mt-6 p-4 bg-emerald-50 text-emerald-700 rounded-xl border border-emerald-100 text-sm font-medium fade-in">
                        ✓ User successfully added to the table!
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="w-full md:w-2/3">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-slate-800">User Directory</h2>
                        <span id="userCount" class="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full">0 Users</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-slate-50/50">
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">No.</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Full Name</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Gender</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Action</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-100">
                                <tr id="emptyRow">
                                    <td colspan="5" class="px-8 py-12 text-center text-slate-400 italic">
                                        The directory is currently empty.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const tableBody = document.getElementById('userTableBody');
        const successMsg = document.getElementById('successMsg');
        const userCountBadge = document.getElementById('userCount');
        let userCount = 0;

        function updateState() {
            userCountBadge.textContent = `${userCount} ${userCount === 1 ? 'User' : 'Users'}`;
            if (userCount === 0) {
                tableBody.innerHTML = `
                    <tr id="emptyRow">
                        <td colspan="5" class="px-8 py-12 text-center text-slate-400 italic">
                            The directory is currently empty.
                        </td>
                    </tr>
                `;
            } else {
                const emptyRow = document.getElementById('emptyRow');
                if (emptyRow) emptyRow.remove();
            }
            
            // Re-index row numbers
            const rows = tableBody.querySelectorAll('tr:not(#emptyRow)');
            rows.forEach((row, index) => {
                row.querySelector('.row-index').textContent = index + 1;
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            userCount++;
            
            // Collect Data
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            
            // Update State (removes empty row if first user)
            updateState();

            // Add new row
            const row = document.createElement('tr');
            row.className = 'hover:bg-slate-50/80 transition-colors fade-in';
            row.innerHTML = `
                <td class="px-8 py-5 text-sm font-medium text-slate-400 row-index">${userCount}</td>
                <td class="px-8 py-5 text-sm font-bold text-slate-800">${firstName} ${lastName}</td>
                <td class="px-8 py-5 text-sm text-slate-600">${gender}</td>
                <td class="px-8 py-5">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        Active
                    </span>
                </td>
                <td class="px-8 py-5">
                    <button class="remove-btn text-rose-500 hover:text-rose-700 text-xs font-bold transition-colors">
                        Remove
                    </button>
                </td>
            `;
            
            // Add Remove Listener
            row.querySelector('.remove-btn').addEventListener('click', () => {
                row.remove();
                userCount--;
                updateState();
            });

            tableBody.appendChild(row);

            // Feedback
            successMsg.classList.remove('hidden');
            setTimeout(() => successMsg.classList.add('hidden'), 3000);

            // Reset
            form.reset();
        });
    </script>
</body>
</html>
