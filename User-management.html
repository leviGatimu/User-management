<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans">
    <!-- Navigation Bar -->
    <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 mb-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight">User Management</h1>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464l.707-.707a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414zm2.12 10.607a1 1 0 010-1.414l.706-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6 md:p-12 pt-0 md:pt-4">
        <div class="flex flex-col md:flex-row gap-10">
            
            <!-- Form Section -->
            <div class="w-full md:w-1/3">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 sticky top-24">
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Create Account</h2>
                    
                    <form id="registrationForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">First Name</label>
                            <input type="text" id="firstName" required placeholder="Jane"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Last Name</label>
                            <input type="text" id="lastName" required placeholder="Doe"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Gender</label>
                            <div class="flex gap-6 mt-2">
                                <label class="flex items-center cursor-pointer group">
                                    <input type="radio" name="gender" value="Male" checked class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 dark:bg-slate-700 dark:border-slate-600">
                                    <span class="ml-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Male</span>
                                </label>
                                <label class="flex items-center cursor-pointer group">
                                    <input type="radio" name="gender" value="Female" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 dark:bg-slate-700 dark:border-slate-600">
                                    <span class="ml-2 text-slate-600 dark:text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Female</span>
                                </label>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                            <input type="password" id="password" required placeholder="••••••••"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>

                        <button type="submit" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-100 dark:shadow-none transition-all active:scale-[0.98]">
                            Register User
                        </button>
                    </form>

                    <!-- Success Message -->
                    <div id="successMsg" class="hidden mt-6 p-4 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-xl border border-emerald-100 dark:border-emerald-800 text-sm font-medium fade-in">
                        ✓ User successfully added to the table!
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="w-full md:w-2/3">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <div class="px-8 py-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-slate-800 dark:text-white">User Directory</h2>
                        <span id="userCount" class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold px-3 py-1 rounded-full">0 Users</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-slate-50/50 dark:bg-slate-700/50">
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">No.</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Full Name</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Gender</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Status</th>
                                    <th class="px-8 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Action</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-100 dark:divide-slate-700">
                                <tr id="emptyRow">
                                    <td colspan="5" class="px-8 py-12 text-center text-slate-400 dark:text-slate-500 italic">
                                        The directory is currently empty.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) {
            lightIcon.classList.remove('hidden');
        } else {
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', () => {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');
            
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        const form = document.getElementById('registrationForm');
        const tableBody = document.getElementById('userTableBody');
        const successMsg = document.getElementById('successMsg');
        const userCountBadge = document.getElementById('userCount');
        let userCount = 0;

        function updateState() {
            userCountBadge.textContent = `${userCount} ${userCount === 1 ? 'User' : 'Users'}`;
            if (userCount === 0) {
                tableBody.innerHTML = `
                    <tr id="emptyRow">
                        <td colspan="5" class="px-8 py-12 text-center text-slate-400 dark:text-slate-500 italic">
                            The directory is currently empty.
                        </td>
                    </tr>
                `;
            } else {
                const emptyRow = document.getElementById('emptyRow');
                if (emptyRow) emptyRow.remove();
            }
            
            const rows = tableBody.querySelectorAll('tr:not(#emptyRow)');
            rows.forEach((row, index) => {
                row.querySelector('.row-index').textContent = index + 1;
            });
        }


    </script>
</body>
</html>
